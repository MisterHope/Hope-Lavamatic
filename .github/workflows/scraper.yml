name: Hope's Hourly Scraper

on:
  schedule:
    - cron: "18,48 4-21 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    
    concurrency:
      group: scraper
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install playwright gspread google-auth pytz python-dotenv
          playwright install chromium

      - name: Run script
        env:
          SITE_LOGIN: ${{ secrets.SITE_LOGIN }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
          BASE_URL: ${{ secrets.BASE_URL }}
          MENU_URL: ${{ secrets.MENU_URL }}
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
        run: python lavbox_gh.py
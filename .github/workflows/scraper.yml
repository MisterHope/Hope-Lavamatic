name: Hope's Hourly Scraper

permissions:
  actions: write

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    
    concurrency:
      group: scraper
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install playwright gspread google-auth pytz python-dotenv
          playwright install chromium

      - name: Run script
        env:
          SITE_LOGIN: ${{ secrets.SITE_LOGIN }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
          BASE_URL: ${{ secrets.BASE_URL }}
          MENU_URL: ${{ secrets.MENU_URL }}
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
        run: python lavbox_gh.py

      - name: Wait 30 minutes
        run: sleep 1800

      - name: Re-trigger workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/scraper.yml/dispatches \
            -d '{"ref":"main"}'